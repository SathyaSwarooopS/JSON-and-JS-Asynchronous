<!DOCTYPE html>
<html>
    <body>

        <h2>Convert JS object to JSON string,then send it to the server</h2>
        <p id="result"></p>
        <script>
            var myobj = { name: "Sathya", age: 12, grade: "7th" };
            var myJSON = JSON.stringify(myobj); // Convert JS object to JSON for sending data to the server
            var newobj = JSON.parse(myJSON); // Convert JSON string back to JS object while receiving data from the server
            document.getElementById("result").innerHTML = + newobj.name;
        </script>
    </body>
</html>
